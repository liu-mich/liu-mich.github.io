# Basic Information
title: Michelle Liu
position: Incoming Ph.D. Student
affiliation: "[Your University]"
email: "[your email (at) university.edu]"

# Search Engine Optimization (SEO)
keywords: Michelle Liu, political science, public opinion, political psychology, political communication, survey methodology
description: Michelle Liu is an incoming Ph.D. student studying public opinion, political psychology, political communication, and survey methodology.
canonical: https://[your-github-username].github.io/

# Links
# If you don't need one of them, you may delete the corresponding line.
# google_scholar: https://scholar.google.com/
# cv_link: assets/files/curriculum_vitae.pdf
github_link: https://github.com/[your-github-username]
# linkedin: https://www.linkedin.com/in/[your-profile]
# twitter: https://twitter.com/[your-handle]

# Images (e.g., your profile picture and your website's favicon)
avatar: ./assets/img/avatar.png
favicon: ./assets/img/favicon.png
favicon_dark: ./assets/img/favicon-dark.png

# Footnote
enable_footnote: true

# Auto Dark Mode
auto_dark_mode: true

# Font
font: "Serif" # or "Sans Serif"

# Use this project as a remote theme for GitHub Pages
remote_theme: yaoyao-liu/minimal-light

# The following files will be removed from the generated website.
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - README_zh_Hans.md
  - README_zh_Hant.md
  - README_de.md
  - LICENSE
  - minimal-light.gemspec
  - html_source_file/
